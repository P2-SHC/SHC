name: Deploy React to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. GitHub 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: 3. 패키지 설치 및 빌드
        working-directory: ./shc-vite
        run: |
          npm install
          
          # .env 파일 생성 및 GitHub Secrets 환경변수 주입
          echo "VITE_DUST_API_KEY=${{ secrets.VITE_DUST_API_KEY }}" > .env
          echo "VITE_WEATHER_API_KEY=${{ secrets.VITE_WEATHER_API_KEY }}" >> .env
          echo "VITE_IP_GEOLOCATION_API_KEY=${{ secrets.VITE_IP_GEOLOCATION_API_KEY }}" >> .env
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env
          
          npm run build

      - name: 4. 배포에 필요한 파일만 모으기
        working-directory: ./shc-vite
        run: |
          mkdir ../deploy # 최상위 폴더에 deploy를 만들어야 scp가 찾기 쉽습니다.
          cp -r dist ../deploy/
          cp Dockerfile ../deploy/
          cp default.conf ../deploy/
          cp docker-compose.yml ../deploy/

      - name: 5. EC2 서버로 배포 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/*"
          strip_components: 1
          target: "/home/ubuntu/react-app"

      - name: 6. EC2에서 기존 컨테이너 내리고 새 Docker 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/react-app
            sudo docker compose down
            sudo docker compose up --build -d
            sudo docker system prune -f